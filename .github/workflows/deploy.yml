name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Only trigger when source files change — not when built output is committed
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Commit built assets back to main so GitHub Pages (main branch) serves them
      - name: Commit built output to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/index.html .
          cp -r dist/assets .
          cp -r dist/images .
          touch .nojekyll
          git add index.html assets/ images/ .nojekyll
          git diff --cached --quiet || git commit -m "chore: update built assets [skip ci]"
          git push origin main
